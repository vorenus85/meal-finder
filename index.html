<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meal Finder</title>
  </head>
  <body>
    <header class="header">
      <h1 class="app-title">Meal Finder</h1>
      <div class="filter">
        <form action="" id="filter">
          <input type="text" placeholder="Search meal by main ingredient..." />
          <button type="submit">Search</button>
          <button type="reset">✕</button>
        </form>
      </div>
    </header>

    <div class="layout">
      <!-- SIDEBAR -->
      <aside class="sidebar favorites">
        <h2>Favorites</h2>

        <div class="favorites-list">
          <div class="favorite-item">
            <img src="meal.jpg" alt="Meal" />
            <div class="favorite-info">
              <span class="meal-name">Chicken Curry</span>
              <button class="remove-favorite">✕</button>
            </div>
          </div>

          <div class="favorite-item">
            <img src="meal.jpg" alt="Meal" />
            <div class="favorite-info">
              <span class="meal-name">Beef Stroganoff</span>
              <button class="remove-favorite">✕</button>
            </div>
          </div>
        </div>

        <div class="favorites-empty">No favorite meals yet</div>
      </aside>

      <!-- MAIN -->
      <main class="main">
        <section class="welcome">
          <h1>Find Your Next Favorite Meal</h1>
          <p>
            Browse categories, explore recipes, and save the meals you love.
          </p>
        </section>
        <!-- CATEGORIES -->
        <section class="categories">
          <h2>Categories</h2>

          <div class="category-grid" id="category-grid">
            <button type="button" class="category-card">Beef</button>
            <button type="button" class="category-card">Breakfast</button>
            <button type="button" class="category-card">Chicken</button>
            <button type="button" class="category-card">Dessert</button>
            <button type="button" class="category-card">Miscellaneous</button>
            <button type="button" class="category-card">Pasta</button>
            <button type="button" class="category-card">Pork</button>
            <button type="button" class="category-card">Seafood</button>
            <button type="button" class="category-card">Side</button>
            <button type="button" class="category-card">Starter</button>
            <button type="button" class="category-card">Vegetarian</button>
            <button type="button" class="category-card">Vegan</button>
          </div>
        </section>

        <!-- MEALS -->
        <section class="meals">
          <h2>Meals</h2>

          <div class="meal-grid" id="meal-grid"></div>
        </section>
      </main>
    </div>
    <div class="meal-modal" id="meal-modal"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
