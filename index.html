<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meal Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
  <body>
    <header class="header">
      <h1 class="app-title">Meal Finder</h1>
      <div class="filter">
        <form action="" class="filter-form" id="filter">
          <input type="text" placeholder="Search meal by main ingredient..." />
          <button type="submit">Search</button>
          <button type="reset">✕</button>
        </form>
      </div>
    </header>

    <div class="layout">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <section class="module favorites">
          <h2>Favorites</h2>
          <hr class="separator" />
          <div class="favorites-container">
            <div class="favorites-list" id="favorites-list">
              <div class="favorite-item">
                <img src="meal.jpg" alt="Meal" />
                <div class="favorite-info">
                  <span class="meal-name">Chicken Curry</span>
                  <button class="remove-favorite">✕</button>
                </div>
              </div>

              <div class="favorite-item">
                <img src="meal.jpg" alt="Meal" />
                <div class="favorite-info">
                  <span class="meal-name">Beef Stroganoff</span>
                  <button class="remove-favorite">✕</button>
                </div>
              </div>
            </div>
          </div>
        </section>
      </aside>

      <!-- MAIN -->
      <main class="main">
        <section class="welcome">
          <h1>Find Your Next Favorite Meal</h1>
          <p>
            Browse categories, explore recipes, and save the meals you love.
          </p>
        </section>
        <hr class="separator" />
        <!-- CATEGORIES -->
        <section class="categories">
          <h2>Categories</h2>

          <div class="category-grid" id="category-grid">
            <button type="button" class="category-card">Beef</button>
            <button type="button" class="category-card">Breakfast</button>
            <button type="button" class="category-card">Chicken</button>
            <button type="button" class="category-card">Dessert</button>
            <button type="button" class="category-card">Miscellaneous</button>
            <button type="button" class="category-card">Pasta</button>
            <button type="button" class="category-card">Pork</button>
            <button type="button" class="category-card">Seafood</button>
            <button type="button" class="category-card">Side</button>
            <button type="button" class="category-card">Starter</button>
            <button type="button" class="category-card">Vegetarian</button>
            <button type="button" class="category-card">Vegan</button>
          </div>
        </section>

        <!-- MEALS -->
        <section class="meals">
          <h2>Meals</h2>

          <div class="meal-grid" id="meal-grid"></div>
        </section>
      </main>
    </div>
    <div class="meal-modal" id="meal-modal"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
